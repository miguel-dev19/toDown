name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.4
    
    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.4
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug
    
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: toDown-debug
        path: app/build/outputs/apk/debug/app-debug.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    
    steps:
    - name: Download APK
      uses: actions/download-artifact@v4
      with:
        name: toDown-debug
    
    - name: Rename APK
      run: mv app-debug.apk toDown-v${{ github.run_number }}.apk
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: toDown v${{ github.run_number }}
        body: |
          Build automatico #${{ github.run_number }}
          
          **Instalacion:** Descargar el APK e instalar
        files: toDown-v${{ github.run_number }}.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
